<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEXA</title>
<style>
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: transparent;
    font-family: Arial, sans-serif;
  }

  .frame-wrap {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }

  .powered {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 10;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.18);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  }

  .powered span {
    font-weight: 800;
  }
</style>
</head>
<body>
  <div class="frame-wrap">
    <iframe
      src="https://samia08-nexa-physics-ai.hf.space"
      title="NEXA AI"
      allow="microphone; camera; clipboard-read; clipboard-write"
    ></iframe>
  </div>

  <div class="powered">Powered by <span>Physics Guider</span></div>
</body>
</html>
